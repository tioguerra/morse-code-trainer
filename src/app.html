<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#ffffff" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="description" content="Aprenda código Morse brincando." />
		<title>Dah · Morse Trainer</title>
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/icon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Defensive: kill any stale service worker registered by older builds.
			// If we found one, force a single reload so the user picks up fresh
			// JS instead of the cached version that was being served.
			(function () {
				if (!('serviceWorker' in navigator)) return;
				navigator.serviceWorker.getRegistrations().then(function (rs) {
					if (rs.length === 0) return;
					Promise.all(rs.map(function (r) { return r.unregister(); }))
						.then(function () {
							return window.caches
								? caches.keys().then(function (ks) {
										return Promise.all(ks.map(function (k) { return caches.delete(k); }));
									})
								: null;
						})
						.then(function () {
							location.reload();
						});
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
